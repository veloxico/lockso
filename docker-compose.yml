services:
  # ─── PostgreSQL 18 ───
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lockso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lockso_secret}
      POSTGRES_DB: ${POSTGRES_DB:-lockso}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lockso}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Redis 7 ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Lockso BE (Rust backend with hot-reload) ───
  lockso-be:
    build:
      context: .
      dockerfile: Dockerfile.be.dev
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lockso}:${POSTGRES_PASSWORD:-lockso_secret}@postgres:5432/${POSTGRES_DB:-lockso}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      LOCKSO_ENV: development
      LOCKSO_LOG_LEVEL: debug
      LOCKSO_MIGRATIONS_PATH: /app/migrations/schema
      RUST_BACKTRACE: 1
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app/backend
      - ./migrations:/app/migrations
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/backend/target
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── Lockso FE (Vite dev server with HMR) ───
  lockso-fe:
    build:
      context: .
      dockerfile: Dockerfile.fe.dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://lockso-be:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - node-modules:/app/frontend/node_modules
    depends_on:
      - lockso-be

volumes:
  pgdata:
  redisdata:
  miniodata:
  cargo-cache:
  cargo-git:
  target-cache:
  node-modules:
