services:
  # ─── PostgreSQL 18 ───
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lockso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lockso}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lockso}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ───
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Lockso Backend ───
  lockso-be:
    build:
      context: .
      dockerfile: Dockerfile.be
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-lockso}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lockso}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      LOCKSO_ENV: production
      LOCKSO_LOG_LEVEL: info
      LOCKSO_MIGRATIONS_PATH: /app/migrations/schema
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ─── Lockso Frontend (nginx) ───
  lockso-fe:
    build:
      context: .
      dockerfile: Dockerfile.fe
      args:
        VITE_API_URL: http://lockso-be:8080
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - lockso-be

volumes:
  pgdata:
  redisdata:
  miniodata:
